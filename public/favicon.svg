<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0b0f17"/>
  <g>
    <!-- row 0 -->
    <rect x="5"  y="5"  width="5" height="5" rx="1.2" fill="#34d399"/>
    <rect x="11" y="5"  width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <rect x="17" y="5"  width="5" height="5" rx="1.2" fill="#34d399"/>
    <rect x="23" y="5"  width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <!-- row 1 -->
    <rect x="5"  y="11" width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <rect x="11" y="11" width="5" height="5" rx="1.2" fill="#34d399"/>
    <rect x="17" y="11" width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <rect x="23" y="11" width="5" height="5" rx="1.2" fill="#34d399"/>
    <!-- row 2 -->
    <rect x="5"  y="17" width="5" height="5" rx="1.2" fill="#34d399"/>
    <rect x="11" y="17" width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <rect x="17" y="17" width="5" height="5" rx="1.2" fill="#34d399"/>
    <rect x="23" y="17" width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <!-- row 3 (tail warp: last two lanes "wasted") -->
    <rect x="5"  y="23" width="5" height="5" rx="1.2" fill="#34d399" opacity="0.65"/>
    <rect x="11" y="23" width="5" height="5" rx="1.2" fill="#34d399"/>
    <rect x="17" y="23" width="5" height="5" rx="1.2" fill="#1f2937" stroke="#374151" stroke-width="0.8"/>
    <rect x="23" y="23" width="5" height="5" rx="1.2" fill="#1f2937" stroke="#374151" stroke-width="0.8"/>
  </g>
</svg>
